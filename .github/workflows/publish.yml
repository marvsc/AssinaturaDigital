name: Conan Publish
on:
   push:
      tags:
         - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
   build-and-publish:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - name: Install and Setup Conan
           uses: conan-io/setup-conan@v1
           with:
              version: 2.25.2

         - name: Prepare environment
           run: |
              mkdir build

         - name: Configure
           run: |
              conan install .
              cmake -DCMAKE_TOOLCHAIN_FILE=build/Release/generators/conan_toolchain.cmake -S . -B build

         - name: Compile
           run: |
              make -C build/

         - name: Prepare package
           run: |
              mkdir -p build/package/lib
              cp build/libassinaturadigital.a build/package/lib/
              cp -r include/ build/package/

         - name: Generate tarball
           run: |
              tar -czvf build/libassinaturadigital-${{ github.ref }}.tgz -C build/package/ include/ lib/

         - name: Create Release
           id: create_release
           uses: actions/create-release@v1
           env:
             GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           with:
             tag_name: ${{ github.ref }}
             release_name: Release ${{ github.ref }}
             body: |
               Release ${{ github.ref }}
             draft: false
             prerelease: false

         - name: Upload Release Asset
           uses: actions/upload-release-asset@v1
           env:
             GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           with:
             upload_url: ${{ steps.create_release.outputs.upload_url }}
             asset_path: ./build/libassinaturadigital-${{ github.ref }}.tgz
             asset_name: libassinaturadigital-${{ github.ref }}.tgz
             asset_content_type: application/x-archive
